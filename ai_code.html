<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Machine Learning Projects</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#ffffff;color:#0b1220}

.frame{
  max-width:1100px;
  margin:20px auto;
  padding:22px;
  border-radius:24px;
  border:2px solid #2f7cff;
  box-shadow:0 0 35px rgba(47,124,255,.55);
  background:#fff;
}

.title{
  font-size:26px;
  font-weight:800;
  text-align:center;
}

.content-frame{
  max-width:1100px;
  margin:20px auto;
  padding:22px;
  border-radius:24px;
  border:2px solid #2f7cff;
  box-shadow:0 0 40px rgba(47,124,255,.45);
  background:#fff;
  min-height:60vh;
  overflow:auto;
}

.item{
  padding:14px;
  margin-bottom:12px;
  border-radius:14px;
  border:1.5px solid #2f7cff;
  box-shadow:0 0 20px rgba(47,124,255,.25);
  cursor:pointer;
}
.item:hover{
  background:#f2f7ff;
  box-shadow:0 0 30px rgba(47,124,255,.6);
}

pre{
  white-space:pre-wrap;
  word-break:break-word;
  font-size:13px;
  line-height:1.6;
}

.back{
  display:inline-block;
  margin-bottom:18px;
  padding:8px 18px;
  border-radius:20px;
  background:#2f7cff;
  color:#fff;
  cursor:pointer;
  box-shadow:0 0 20px rgba(47,124,255,.6);
}

.hidden{display:none}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="repoScreen">
  <div class="frame">
    <div class="title">Machine Learning Projects</div>
  </div>
  <div class="content-frame" id="repoList">
    Loading repositories...
  </div>
</div>

<!-- SCREEN 2 -->
<div id="fileScreen" class="hidden">
  <div class="frame">
    <div class="title">Project Files</div>
  </div>
  <div class="content-frame">
    <div class="back" onclick="goRepos()">← Back</div>
    <div id="fileList">Loading files...</div>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="codeScreen" class="hidden">
  <div class="frame">
    <div class="title" id="codeTitle">File Code</div>
  </div>
  <div class="content-frame">
    <div class="back" onclick="goFiles()">← Back</div>
    <pre id="codeView">Loading code...</pre>
  </div>
</div>

<script>

const WORKER = "https://mute-sea-a86c.darmindark691.workers.dev";

let currentRepo = "";
let currentPath = "";

/* ========= CLEAN REPO FORMAT ========= */
function cleanRepoString(repo){
  return repo.replace("github |","").trim();
}

/* ========= LOAD REPOS ========= */
async function loadRepos(){

  const res = await fetch(`${WORKER}?action=repos`);
  const data = await res.json();

  const box = document.getElementById("repoList");
  box.innerHTML = "";

  if(!data.repos || data.repos.length===0){
    box.innerHTML = "No repositories found in KV";
    return;
  }

  data.repos.forEach(repo=>{
    const div = document.createElement("div");
    div.className="item";
    div.textContent = repo;

    div.onclick = ()=>{
      const cleaned = cleanRepoString(repo);
      openRepo(cleaned,"");
    };

    box.appendChild(div);
  });
}

/* ========= OPEN REPO ========= */
async function openRepo(repo,path=""){

  currentRepo = repo;
  currentPath = path;

  document.getElementById("repoScreen").classList.add("hidden");
  document.getElementById("fileScreen").classList.remove("hidden");

  const res = await fetch(
    `${WORKER}?action=files&repo=${encodeURIComponent(repo)}&path=${encodeURIComponent(path)}`
  );

  const data = await res.json();

  const box = document.getElementById("fileList");
  box.innerHTML = "";

  if(!data.files || data.files.length===0){
    box.innerHTML = "No files returned";
    return;
  }

  data.files.forEach(f=>{
    const div = document.createElement("div");
    div.className="item";

    if(f.type==="dir"){
      div.textContent = "📁 " + f.name;
      div.onclick = ()=>openRepo(repo,f.path);
    }
    else{
      div.textContent = "📄 " + f.name;
      div.onclick = ()=>openCode(f.path,f.name);
    }

    box.appendChild(div);
  });
}

/* ========= OPEN CODE ========= */
async function openCode(path,name){

  document.getElementById("fileScreen").classList.add("hidden");
  document.getElementById("codeScreen").classList.remove("hidden");

  document.getElementById("codeTitle").textContent = name + " Code";

  const res = await fetch(
    `${WORKER}?action=code&repo=${encodeURIComponent(currentRepo)}&path=${encodeURIComponent(path)}`
  );

  const data = await res.json();

  document.getElementById("codeView").textContent =
    data.code || "No code found";
}

/* ========= NAVIGATION ========= */
function goRepos(){
  document.getElementById("fileScreen").classList.add("hidden");
  document.getElementById("repoScreen").classList.remove("hidden");
}

function goFiles(){
  document.getElementById("codeScreen").classList.add("hidden");
  document.getElementById("fileScreen").classList.remove("hidden");
}

/* INIT */
loadRepos();

</script>

</body>
</html>
