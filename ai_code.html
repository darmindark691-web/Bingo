<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BharatVerse Code Lab</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{
  background:#ffffff;
  color:#0b1220;
}

/* ===== GLOBAL FRAME ===== */
.frame{
  max-width:1100px;
  margin:22px auto;
  padding:22px;
  border-radius:22px;
  background:#fff;
  border:2px solid #2f7cff;
  box-shadow:0 0 35px rgba(47,124,255,.45);
}

/* ===== HEADER ===== */
.header{
  font-size:30px;
  font-weight:800;
  text-align:center;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
  margin-top:20px;
}

/* ===== CARD ===== */
.card{
  padding:18px;
  border-radius:18px;
  border:2px solid #2f7cff;
  box-shadow:0 0 25px rgba(47,124,255,.35);
  cursor:pointer;
  transition:.25s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(47,124,255,.65);
}
.card h3{
  font-size:18px;
  margin-bottom:8px;
}

/* ===== REPO LIST ===== */
.repo{
  padding:14px;
  border-radius:14px;
  border:1.8px solid #2f7cff;
  margin-bottom:12px;
  box-shadow:0 0 18px rgba(47,124,255,.25);
}

/* ===== BUTTON ===== */
.btn{
  padding:12px 28px;
  border-radius:22px;
  border:none;
  background:#2f7cff;
  color:#fff;
  font-weight:700;
  cursor:pointer;
  box-shadow:0 0 20px rgba(47,124,255,.6);
}
.center{text-align:center}

/* ===== HIDE ===== */
.hidden{display:none}
</style>
</head>

<body>

<!-- AI CATEGORY SCREEN -->
<div id="aiScreen" class="frame">
  <div class="header">AI Code Lab</div>

  <div class="grid">
    <div class="card" onclick="openSub('ml')"><h3>Machine Learning Code</h3></div>
    <div class="card" onclick="openSub('nlp')"><h3>NLP Code</h3></div>
    <div class="card" onclick="openSub('cv')"><h3>Computer Vision Code</h3></div>
    <div class="card" onclick="openSub('rl')"><h3>Reinforcement Learning</h3></div>
    <div class="card" onclick="openSub('agents')"><h3>AI Agents</h3></div>
    <div class="card" onclick="openSub('mlops')"><h3>MLOps & Deployment</h3></div>
  </div>
</div>

<!-- PROJECT LIST SCREEN -->
<div id="repoScreen" class="frame hidden">
  <div id="repoTitle" class="header"></div>

  <div id="repoList" style="margin-top:22px"></div>

  <div class="center">
    <button class="btn" onclick="nextPage()">Next</button>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const WORKER = "https://calm-sea-aee3.darmindark691.workers.dev";
const PAGE_SIZE = 10;

/* ================= STATE ================= */
let currentCategory = "";
let page = 0;

/* ================= SUB CATEGORY ================= */
function openSub(cat){
  currentCategory = cat;
  page = 0;
  document.getElementById("aiScreen").classList.add("hidden");
  document.getElementById("repoScreen").classList.remove("hidden");

  const titleMap = {
    ml:"Machine Learning Projects",
    nlp:"NLP Projects",
    cv:"Computer Vision Projects",
    rl:"Reinforcement Learning Projects",
    agents:"AI Agent Projects",
    mlops:"MLOps Projects"
  };

  document.getElementById("repoTitle").textContent = titleMap[cat];
  loadRepos();
}

/* ================= LOAD REPOS ================= */
async function loadRepos(){
  const box = document.getElementById("repoList");
  box.innerHTML = "Loading repositories...";

  const res = await fetch(
    `${WORKER}?action=repos&category=${currentCategory}&page=${page}&limit=${PAGE_SIZE}`
  );
  const data = await res.json();

  box.innerHTML = "";

  if(!data.repos || data.repos.length===0){
    box.innerHTML = "No repositories found";
    return;
  }

  data.repos.forEach(r=>{
    const div = document.createElement("div");
    div.className = "repo";
    div.innerHTML = `<b>${r}</b><br><small>Source: GitHub</small>`;
    box.appendChild(div);
  });
}

/* ================= PAGINATION ================= */
function nextPage(){
  page++;
  loadRepos();
}
</script>

</body>
</html>
