<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BharatVerse — Bharat Search Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#fff;color:#202124}

/* ===== HOME ===== */
.container{text-align:center;margin-top:90px;padding:0 16px}
.logo-box{display:flex;justify-content:center;margin-bottom:22px}
.logo{width:170px;height:170px;border-radius:50%;animation:spin 8s linear infinite;box-shadow:0 8px 30px rgba(66,133,244,.35)}
@keyframes spin{to{transform:rotate(360deg)}}
.brand-title{font-size:40px;font-weight:600}
.brand-sub{font-size:14px;color:#5f6368;margin-bottom:26px}

.search-box{display:flex;max-width:560px;margin:auto;border:1px solid #dfe1e5;border-radius:40px;padding:6px 12px;box-shadow:0 1px 6px rgba(32,33,36,.28)}
.search-box input{flex:1;border:none;outline:none;font-size:16px;padding:10px}
.search-box button{border:none;background:none;font-size:18px}

/* ===== MENU ===== */
.menu-btn{position:fixed;top:15px;left:15px;font-size:26px;cursor:pointer;z-index:1000}
.side-menu{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#fff;border-right:1px solid #ddd;transition:.3s;padding:12px;overflow:auto;z-index:999}
.side-menu.open{left:0}
.side-menu h3{margin:14px 0 6px;font-size:14px}
.side-menu button{display:block;width:100%;padding:6px;border:none;background:none;text-align:left;cursor:pointer;color:#1a73e8}

/* ===== BOTTOM NAV ===== */
.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;height:65px;
  background:#fff;border-top:1px solid #ddd;
  display:flex;justify-content:space-around;align-items:center;
  z-index:1000
}
.bottom-btn{font-weight:600;color:#1a73e8;cursor:pointer}

/* ===== NEXUS ===== */
#nexusOverlay{
  position:fixed;inset:0;background:#fff;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding-bottom:120px;
  transform:scale(0);transition:.3s;z-index:2000
}
#nexusOverlay.active{transform:scale(1)}

.orbit{
  position:absolute;bottom:220px;
  width:300px;height:300px;border-radius:50%;
  animation:spinOrbit 18s linear infinite
}
@keyframes spinOrbit{to{transform:rotate(360deg)}}

.orbit-item{
  position:absolute;width:90px;height:90px;border-radius:50%;
  background:#fff;display:flex;align-items:center;justify-content:center;
  text-align:center;color:#1a73e8;font-weight:600;font-size:13px;
  border:2px solid #1a73e8;
  box-shadow:0 0 30px rgba(26,115,232,.7);
  cursor:pointer
}
.orbit-item:nth-child(1){top:0;left:105px}
.orbit-item:nth-child(2){top:105px;right:0}
.orbit-item:nth-child(3){bottom:0;left:105px}
.orbit-item:nth-child(4){top:105px;left:0}

.nexus-btn{
  background:#1a73e8;color:#fff;font-weight:700;
  padding:14px 50px;border-radius:40px;font-size:18px;
  box-shadow:0 0 35px rgba(26,115,232,.6);
  cursor:pointer
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<main class="container" id="home">
  <div class="logo-box"><img src="logo.png" class="logo"></div>
  <h1 class="brand-title">BharatVerse</h1>
  <p class="brand-sub">Bharat Search Hub</p>
  <div class="search-box">
    <input placeholder="Search India & World Knowledge…">
    <button>🔍</button>
  </div>
</main>

<!-- NEXUS -->
<div id="nexusOverlay">
  <div class="orbit">
    <div class="orbit-item" onclick="openStartup()">Startups</div>

    <!-- 🔥 CONNECTED CODE LAB -->
    <div class="orbit-item" onclick="openCodeLab()">Code Lab</div>

    <div class="orbit-item">Datasets</div>
    <div class="orbit-item">Cognitive Lab</div>
  </div>
  <div class="nexus-btn" onclick="closeNexus()">Close</div>
</div>

<div class="bottom-bar">
  <div class="bottom-btn" onclick="openNexus()">Nexus</div>
</div>

<script>
const nexus=document.getElementById("nexusOverlay")

function openNexus(){nexus.classList.add("active")}
function closeNexus(){nexus.classList.remove("active")}

function openStartup(){
  window.location.href="submit-startup.html"
}

/* ✅ MAIN CONNECTOR */
function openCodeLab(){
  // yahin se tumhara AI → ML → repos flow start hota hai
  window.location.href="code-lab.html"
}
</script>

</body>
</html>
