<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BharatVerse — Bharat Search Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#fff;color:#202124}

/* HOME */

.container{text-align:center;margin-top:90px;padding:0 16px}

.logo{
width:170px;
height:170px;
border-radius:50%;
animation:spin 8s linear infinite;
box-shadow:0 8px 30px rgba(66,133,244,.35)
}

@keyframes spin{to{transform:rotate(360deg)}}

.brand-title{font-size:40px;font-weight:600}
.brand-sub{font-size:14px;color:#5f6368;margin-bottom:26px}

.search-box{
display:flex;
max-width:560px;
margin:auto;
border:1px solid #dfe1e5;
border-radius:40px;
padding:6px 12px;
box-shadow:0 1px 6px rgba(32,33,36,.28)
}

.search-box input{
flex:1;
border:none;
outline:none;
font-size:16px;
padding:10px
}

/* MENU */

.menu-btn{
position:fixed;
top:15px;
left:15px;
font-size:26px;
cursor:pointer
}

.side-menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#fff;
border-right:1px solid #ddd;
transition:.3s;
padding:12px;
overflow:auto
}

.side-menu.open{left:0}

.side-menu button{
display:block;
width:100%;
padding:6px;
border:none;
background:none;
text-align:left;
cursor:pointer
}

/* RESEARCH */

#research{display:none;padding:20px}

.paper{
padding:10px;
border-bottom:1px solid #eee
}

.paper a{
text-decoration:none;
color:#1a73e8
}

/* PERSONALITIES */

.frames-section{
max-width:820px;
margin:40px auto
}

.frames-title{
font-size:26px;
font-weight:700;
margin-bottom:20px
}

.frames-box{
border-radius:25px;
box-shadow:0 0 35px rgba(26,115,232,.5);
overflow:hidden
}

.frames-box iframe{
width:100%;
height:600px;
border:none
}

/* BOTTOM */

.bottom-bar{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#fff;
border-top:1px solid #ddd;
display:flex;
justify-content:space-around;
align-items:center
}

.bottom-btn{
color:#1a73e8;
font-weight:600;
cursor:pointer
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="side-menu" id="menu">

<h3>arXiv Research</h3>

<button onclick="openResearch('cs.AI')">AI</button>
<button onclick="openResearch('cs.LG')">Machine Learning</button>
<button onclick="openResearch('cs.CV')">Computer Vision</button>
<button onclick="openResearch('cs.CL')">NLP</button>
<button onclick="openResearch('cs.CR')">Security</button>
<button onclick="openResearch('cs.DS')">Data Structures</button>
<button onclick="openResearch('cs.SE')">Software Eng</button>
<button onclick="openResearch('math.OC')">Optimization</button>
<button onclick="openResearch('math.PR')">Probability</button>
<button onclick="openResearch('stat.ML')">Stat ML</button>
<button onclick="openResearch('physics.gen-ph')">Physics</button>

</div>

<main class="container" id="home">

<img src="logo.png" class="logo">

<h1 class="brand-title">BharatVerse</h1>
<p class="brand-sub">Bharat Search Hub</p>

<div class="search-box">
<input placeholder="Search India & World Knowledge…">
</div>

</main>

<section id="research"></section>

<!-- PERSONALITIES FRAMES -->

<section class="frames-section">

<div class="frames-title">
Eminent Personalities of India
</div>

<div class="frames-box">

<iframe src="frames.html"></iframe>

</div>

</section>

<!-- BOTTOM -->

<div class="bottom-bar">

<div class="bottom-btn" onclick="openNexus()">Nexus</div>

<div class="bottom-btn" onclick="openReels()">Reels</div>

</div>

<script>

function toggleMenu(){
menu.classList.toggle("open")
}

let page=0
let category=""

const WORKER="https://crimson-frost-ed87.darmindark691.workers.dev"

function openResearch(cat){

category=cat
page=0

home.style.display="none"
research.style.display="block"

research.innerHTML=`
<h1 class="brand-title">BharatVerse</h1>
<p class="brand-sub">Bharat Search Hub</p>

<div id="list"></div>
`

load()

toggleMenu()

}

async function load(){

const r=await fetch(`${WORKER}?cat=${category}&page=${page}`)

const d=await r.json()

const box=document.getElementById("list")

box.innerHTML=""

d.results.forEach(p=>{

box.innerHTML+=`
<div class="paper">
<a target="_blank" href="${p.pdf}">📄 ${p.title}</a>
</div>
`

})

}

</script>

</body>
</html>
